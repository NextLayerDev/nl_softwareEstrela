# CI do Estrela Gestão — lint e testes.
#
# Ordem obrigatória do job `testes`: alembic upgrade head -> seed.py -> pytest.
# O tests/conftest.py NÃO cria banco (usa o engine global + SAVEPOINT), e o
# test_ui.py/test_rbac.py fazem login REAL com admin@estrela.local — sem o seed,
# ~20 testes falham com "assert 303 == 401". A extensão pg_trgm NÃO precisa de
# step: a migration inicial (ebe4f3cc404e) faz CREATE EXTENSION.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Sem paths-ignore no trigger de propósito: um workflow não-disparado deixa o
# required check pendurado para sempre. Quem filtra é o job `mudancas`, via `if:`
# (um job "skipped" satisfaz a branch protection; um job ausente, não).

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  # Cancelar na main deixaria commits sem run conclusivo, e o gate do release
  # (Fase 6) depende de haver um run verde por sha.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  PYTHON_VERSION: "3.12"

jobs:
  mudancas:
    name: Detectar mudanças
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      codigo: ${{ steps.filtro.outputs.codigo }}
      docker: ${{ steps.filtro.outputs.docker }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filtro
        with:
          filters: |
            codigo:
              - 'app/**'
              - 'tests/**'
              - 'alembic/**'
              - 'scripts/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - '.github/workflows/**'
            # Filtro próprio: `codigo` não inclui Dockerfile nem .dockerignore, e um PR
            # que mexa SÓ no .dockerignore é exatamente aquele em que a asserção abaixo
            # mais precisa rodar.
            docker:
              - 'Dockerfile'
              - '.dockerignore'
              - 'app/**'
              - 'scripts/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - '.github/workflows/**'

  lint:
    name: Lint (ruff)
    needs: mudancas
    if: needs.mudancas.outputs.codigo == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      # setup-uv não publica tag móvel de major (v8 não existe como ref) — pinar exato.
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
      - run: uv sync --frozen
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  testes:
    name: Testes (pytest)
    needs: mudancas
    if: needs.mudancas.outputs.codigo == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16.4
        env:
          POSTGRES_USER: estrela
          POSTGRES_PASSWORD: estrela
          POSTGRES_DB: estrela_gestao
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U estrela -d estrela_gestao"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      # A env var vence o .env no pydantic-settings (e não há .env no runner).
      DATABASE_URL: postgresql+psycopg://estrela:estrela@localhost:5432/estrela_gestao
      # ENV=dev de propósito: com prod, o validator de segredos derruba o startup
      # e o TrustedHostMiddleware recusa o "testserver" do TestClient.
      ENV: dev
      # S3_ACCESS_KEY fica VAZIA: a migration b7e2c9f4a1d8 só tenta alcançar o
      # MinIO se ela estiver preenchida. Vazia = zero egress no CI.
      S3_ACCESS_KEY: ""
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
      # Sem libs nativas do WeasyPrint: nada em app/ ou tests/ o importa (só os
      # 3 geradores de PDF, com import lazy). Instalá-las custa ~30s por run à toa.
      - run: uv sync --frozen

      - name: Aplicar migrations
        run: uv run alembic upgrade head

      - name: Popular dados (obrigatório antes do pytest)
        run: uv run python scripts/seed.py

      - name: Rodar testes
        run: uv run pytest --cov=app --cov-report=term-missing --cov-report=json

      - name: Publicar cobertura no summary
        if: always()
        run: |
          if [ -f coverage.json ]; then
            PCT=$(python -c "import json;print(f\"{json.load(open('coverage.json'))['totals']['percent_covered']:.1f}\")")
            echo "## Cobertura: ${PCT}%" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Número medido **no runner** — é ele que calibra o \`fail_under\` da Fase 2." >> "$GITHUB_STEP_SUMMARY"
          fi

  docker:
    name: Imagem (build + asserções)
    needs: mudancas
    if: needs.mudancas.outputs.docker == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      # Tag só do runner. Nada aqui é publicado: quem publica é o release.yml, a partir
      # de uma tag v*.*.*, e só com um run VERDE deste workflow no mesmo sha.
      IMG: estrela-gestao:ci-${{ github.sha }}
      # Valor sentinela. Serve para provar que o Dockerfile ainda consome os build-args —
      # se alguém remover os ARGs, a imagem sai com o default `dev` e o release publicaria
      # uma imagem que a aba /deploy não consegue identificar (não há .git dentro dela).
      VERSAO_TESTE: 0.0.0-ci
    steps:
      - uses: actions/checkout@v7

      - name: Fabricar segredos e dados falsos no contexto do build
        # ANTES do build, de propósito. Se estes arquivos não existirem no contexto, a
        # asserção lá embaixo passa por VACUIDADE: no runner não existe .env.prod, e
        # "não achei" não distinguiria "o .dockerignore funciona" de "o arquivo nunca
        # esteve lá". O .git já veio do checkout.
        run: |
          echo "DB_PASSWORD=segredo-de-mentira-do-ci" > .env
          echo "JWT_SECRET=segredo-de-mentira-do-ci" > .env.prod
          mkdir -p data && echo "planilha falsa da cliente" > data/estoque.xlsx

      - uses: docker/setup-buildx-action@v4

      - name: Build da imagem
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          # load: joga no daemon local do runner para os `docker run` abaixo.
          load: true
          tags: ${{ env.IMG }}
          build-args: |
            APP_VERSION=${{ env.VERSAO_TESTE }}
            GIT_SHA=${{ github.sha }}
            BUILD_DATE=1970-01-01T00:00:00Z
            APP_TAG=v0.0.0-ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Asserção do .dockerignore (segredos e dados FORA da imagem)
        # O teste que valida a premissa central de segurança do projeto. O Dockerfile faz
        # `COPY . .` e o .gitignore NÃO se aplica ao contexto do build: sem o .dockerignore,
        # o .env.prod (DB_PASSWORD, JWT_SECRET), as planilhas reais da cliente e o histórico
        # do git vão assados numa layer de uma imagem publicada num registry PÚBLICO.
        # Publicado é para sempre — não existe "despublicar" uma layer que alguém puxou.
        #
        # Uma linha a mais no .dockerignore não tem como ser testada por unit test; só
        # olhando dentro da imagem que o build realmente produziu.
        run: |
          # set -e explícito, não herdado do default do runner: num step de asserção, um
          # comando que falha no meio e não interrompe nada é como o teste passa a mentir.
          set -euo pipefail

          # `ls -d` de cada caminho proibido. 2>/dev/null || true porque quem julga é o
          # CONTEÚDO de $ACHADOS, não o exit code do ls — que é não-zero justamente no
          # caso bom (nada encontrado) e zero no caso ruim.
          ACHADOS=$(docker run --rm --entrypoint sh "$IMG" -c \
            'ls -d /app/.env /app/.env.prod /app/.git /app/data 2>/dev/null || true')

          if [ -n "$ACHADOS" ]; then
            echo "::error::.dockerignore FUROU. Encontrado dentro da imagem:"
            echo "$ACHADOS"
            echo "::error::Isto iria para o GHCR (repo PÚBLICO) e não há como despublicar uma layer já puxada. Corrija o .dockerignore."
            exit 1
          fi
          echo "OK: /app/.env, /app/.env.prod, /app/.git e /app/data não existem na imagem."

          # Contraprova: a asserção precisa saber ACHAR um arquivo quando ele existe.
          # Sem isto, um `ls` quebrado ou um entrypoint trocado deixaria o teste verde
          # para sempre, medindo nada.
          if ! docker run --rm --entrypoint sh "$IMG" -c 'ls -d /app/pyproject.toml' >/dev/null 2>&1; then
            echo "::error::A asserção está quebrada: nem /app/pyproject.toml foi encontrado na imagem."
            exit 1
          fi
          echo "OK: contraprova — /app/pyproject.toml está presente, o teste mede algo."

      - name: Conferir que os build-args chegaram na imagem (APP_VERSION != dev)
        run: |
          set -euo pipefail
          VERSAO=$(docker run --rm --entrypoint sh "$IMG" -c 'printf "%s" "$APP_VERSION"')
          echo "APP_VERSION na imagem: '$VERSAO'"
          if [ "$VERSAO" = "dev" ] || [ -z "$VERSAO" ]; then
            echo "::error::APP_VERSION saiu como '$VERSAO' mesmo com --build-arg. O ARG/ENV do Dockerfile foi removido ou renomeado — o release publicaria uma imagem anônima e a aba /deploy ficaria cega."
            exit 1
          fi
          if [ "$VERSAO" != "$VERSAO_TESTE" ]; then
            echo "::error::APP_VERSION é '$VERSAO', esperado '$VERSAO_TESTE'. O build-arg não está sendo respeitado."
            exit 1
          fi
          echo "OK: o Dockerfile consome APP_VERSION via build-arg."

  migracoes:
    name: Guardas de migration
    needs: mudancas
    if: needs.mudancas.outputs.codigo == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16.4
        env:
          POSTGRES_USER: estrela
          POSTGRES_PASSWORD: estrela
          POSTGRES_DB: estrela_gestao
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U estrela -d estrela_gestao"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://estrela:estrela@localhost:5432/estrela_gestao
      ENV: dev
      # Vazia: a migration b7e2c9f4a1d8 só tenta alcançar o MinIO com a chave preenchida.
      S3_ACCESS_KEY: ""
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
      - run: uv sync --frozen

      - name: Head única
        # Duas heads quebram o ScriptDirectory, logo o `alembic upgrade head` do
        # entrypoint, logo (com set -euo pipefail) o container inteiro. Só aparece no
        # merge de dois PRs que ambos criaram migration — nenhum dos dois falha sozinho.
        run: |
          set -euo pipefail
          N=$(uv run alembic heads | grep -c '(head)')
          echo "heads encontradas: $N"
          if [ "$N" -ne 1 ]; then
            uv run alembic heads
            echo "::error::Há $N heads no Alembic. Faça o merge delas antes."
            exit 1
          fi

      - name: Upgrade em banco limpo
        run: uv run alembic upgrade head

      - name: Modelo bate com as migrations (alembic check)
        # Pega o model alterado sem migration correspondente — que em produção viraria
        # erro difuso de coluna inexistente, não um erro de startup.
        run: uv run alembic check

      - name: Downgrade -1 e volta
        # Não prova que o rollback do SISTEMA é seguro (isso é outra propriedade, medida
        # pelo agente/expand-contract) — prova só que o script de downgrade não é ficção.
        run: |
          set -euo pipefail
          uv run alembic downgrade -1
          uv run alembic upgrade head

      - name: Downgrade até a base
        # A cadeia inteira desmonta? Pega ENUM órfão (o Postgres não dropa tipo com
        # drop_table) e FK esquecida no downgrade.
        run: uv run alembic downgrade base

  ci-ok:
    name: ci-ok
    # Agregador: é ESTE o nome a marcar como required check na Fase 5. Os nomes
    # dos jobs acima podem mudar; este não.
    if: always()
    needs: [mudancas, lint, testes, docker, migracoes]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Conferir resultado dos jobs
        # Passado por env, não interpolado dentro da string do shell.
        env:
          RESULTADOS: ${{ toJSON(needs) }}
        run: |
          echo "$RESULTADOS"
          if echo "$RESULTADOS" | grep -qE '"result": *"(failure|cancelled)"'; then
            echo "::error::Algum job da CI falhou ou foi cancelado."
            exit 1
          fi
          echo "CI OK."
