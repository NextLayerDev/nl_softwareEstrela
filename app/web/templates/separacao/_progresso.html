{# Fragmento HTMX: barra de progresso + botão concluir. Trocado a cada item conferido. #}
<div id="progresso" class="card">
  {% set pct = (feitos * 100 // total) if total else 0 %}
  <div class="mb-2 flex items-center justify-between text-sm">
    <span>Conferidos: <strong>{{ feitos }}</strong> de {{ total }}</span>
    <span>{{ pct }}%</span>
  </div>
  <div class="h-3 w-full overflow-hidden rounded bg-marca-fundo"
       role="progressbar" aria-valuenow="{{ feitos }}" aria-valuemin="0" aria-valuemax="{{ total }}"
       aria-label="Itens conferidos">
    <div class="h-3 bg-gold-500 transition-all" style="width: {{ pct }}%"></div>
  </div>
  <div class="mt-3 text-right">
    <form method="post" action="/separacao/{{ pedido.id }}/concluir">
      <button class="btn-primario" {% if feitos < total or total == 0 %}disabled{% endif %}>
        Concluir separação
      </button>
    </form>
  </div>
</div>
