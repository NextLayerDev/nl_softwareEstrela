<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Entrar · Estrela Gestão</title>
  <link rel="stylesheet" href="/static/css/output.css?v={{ asset_version }}" />
  <link rel="manifest" href="/static/manifest.webmanifest" />
  <meta name="theme-color" content="#B98A19" />
</head>
<body class="flex min-h-screen items-center justify-center bg-sidebar p-4">
  <main class="w-full max-w-sm">
    <div class="mb-6 text-center">
      <p class="text-3xl font-bold text-gold-400"><span aria-hidden="true">★</span> Estrela Gestão</p>
      <p class="mt-1 text-sm text-sidebar-texto/70">Controle de estoque e pedidos</p>
    </div>
    <form method="post" action="/login" class="card space-y-4">
      <div>
        <h1 class="text-lg font-semibold">Entrar</h1>
        <p class="text-sm text-gray-500">Use suas credenciais de acesso.</p>
      </div>
      {% if erro %}<div class="alerta-erro" role="alert">{{ erro }}</div>{% endif %}
      <div>
        <label class="label" for="email">E-mail</label>
        <input class="input" type="email" id="email" name="email" value="{{ email or '' }}"
               autocomplete="username" required autofocus />
      </div>
      <div>
        <label class="label" for="senha">Senha</label>
        <input class="input" type="password" id="senha" name="senha"
               autocomplete="current-password" required />
      </div>
      <button type="submit" class="btn-primario w-full">Entrar</button>
    </form>
  </main>
</body>
</html>
