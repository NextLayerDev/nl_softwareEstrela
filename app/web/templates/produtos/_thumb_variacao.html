<div id="var-thumb-{{ variacao.id }}" class="flex flex-col items-center gap-2 rounded-lg border border-marca-borda p-3">
  <div class="aspect-square w-full overflow-hidden rounded-lg bg-marca-fundo">
    {% if variacao.imagem_url %}
      <img src="{{ foto_url(variacao.imagem_url) }}" alt="{{ variacao.cor or 'padrão' }}"
           class="h-full w-full object-cover" />
    {% else %}
      <div class="flex h-full w-full items-center justify-center text-xs text-gray-400">sem foto</div>
    {% endif %}
  </div>
  <div class="w-full text-center">
    <input type="text" name="cor" value="{{ variacao.cor }}" placeholder="padrão"
           hx-post="/produtos/variacao/{{ variacao.id }}/cor"
           hx-trigger="change"
           hx-target="#var-thumb-{{ variacao.id }}"
           hx-swap="outerHTML"
           class="input py-1 text-center text-sm font-medium" />
    <form hx-encoding="multipart/form-data">
      <label class="mt-1 block cursor-pointer text-xs">
        <input type="file" name="imagem" accept="image/*" class="hidden"
               hx-post="/produtos/variacao/{{ variacao.id }}/imagem"
               hx-trigger="change"
               hx-target="#var-thumb-{{ variacao.id }}"
               hx-swap="outerHTML"
               hx-indicator="#var-carregando-{{ variacao.id }}" />
        <span class="btn-secundario inline-block w-full px-2 py-1">
          {{ "Trocar foto" if variacao.imagem_url else "Enviar foto" }}
        </span>
      </label>
    </form>
    <span id="var-carregando-{{ variacao.id }}" class="carregando" role="status">enviando…</span>
  </div>
  {% if variacao.imagem_url %}
  <button hx-post="/produtos/variacao/{{ variacao.id }}/imagem/remover"
          hx-target="#var-thumb-{{ variacao.id }}" hx-swap="outerHTML"
          class="btn-perigo w-full px-2 py-1 text-xs">Remover</button>
  {% endif %}
</div>
