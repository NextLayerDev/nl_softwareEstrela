[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os
# A URL real vem de app.core.config (env.py sobrescreve sqlalchemy.url).
sqlalchemy.url = postgresql+psycopg://estrela:senha@localhost:5432/estrela_gestao

[post_write_hooks]
# Ordem importa: o --fix ordena os imports (o template do Alembic gera "from alembic
# import op" antes de "import sqlalchemy", que o I001 reprova) e só depois o format
# ajusta o resto. Sem o lint aqui, TODA migration autogerada nasce reprovando o CI.
hooks = ruff_lint, ruff_format
ruff_lint.type = exec
ruff_lint.executable = ruff
ruff_lint.options = check --fix REVISION_SCRIPT_FILENAME
ruff_format.type = exec
ruff_format.executable = ruff
ruff_format.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
